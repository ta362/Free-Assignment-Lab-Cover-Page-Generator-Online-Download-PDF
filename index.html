<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assignment / Lab Copy Cover Page Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f2f2f2;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input,
select{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:12px 20px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
margin-right:10px;
}

.generate{
background:#1976d2;
color:#fff;
}

.download{
background:#2e7d32;
color:#fff;
}

#preview{
margin-top:30px;
display:none;
background: #e0e0e0;
padding: 20px;
border-radius: 8px;
}

/* 100% PERFECT 1-PAGE A4 COVER DESIGN */
.cover-page {
width: 210mm;
height: 296mm; /* এ৪ সাইজের চেয়ে ১মিমি কম রাখা হয়েছে যাতে কোনোভাবেই ২য় পেজ তৈরি না হয় */
background: #fff;
margin: auto;
padding: 20mm 15mm;
font-family: "Times New Roman", serif;
text-align: center;
position: relative;
box-sizing: border-box;
overflow: hidden;
}

.type {
font-size: 32px;
font-weight: bold;
text-transform: uppercase;
margin-top: 10mm;
letter-spacing: 1px;
}
  
.college {
font-size: 34px;
line-height: 1.3;
font-weight: bold;
margin-top: 10mm;
margin-bottom: 15mm;
}

.course-info {
margin-top: 15mm;
margin-bottom: 15mm;
}

.course {
font-size: 22px;
margin: 8px 0;
}

.logo-container {
height: 150px;
margin: 15mm auto;
text-align: center;
}

.logo {
max-width: 150px;
max-height: 150px;
object-fit: contain;
display: inline-block;
}

/* সাবমিশন সেকশন দুটি টেবিল লেআউটে করা হয়েছে যাতে পিডিএফ-এ ফ্লেক্সবক্সের ঝামেলা না হয় */
.submission-table {
width: 100%;
margin-top: 20mm;
border-collapse: collapse;
}

.submission-table td {
width: 50%;
vertical-align: top;
text-align: left;
padding: 0 10px;
}

.section h3 {
font-size: 24px;
font-weight: bold;
border-bottom: 2px solid #000;
padding-bottom: 5px;
margin-bottom: 15px;
text-transform: uppercase;
}

.name {
font-size: 20px;
font-weight: bold;
margin-bottom: 8px;
}

.section p {
font-size: 17px;
line-height: 1.5;
margin: 5px 0;
}
  
.date {
position: absolute;
bottom: 25mm; /* পেজের একদম নিচে নির্দিষ্ট দূরত্বে ফিক্সড থাকবে */
left: 0;
width: 100%;
font-size: 18px;
font-weight: bold;
text-align: center;
}

@media(max-width:850px){
/* ব্রাউজার প্রিভিউ রেসপন্সিভ এর জন্য */
.cover-page {
width: 100%;
height: auto;
padding: 20px;
}
.submission-table td {
display: block;
width: 100%;
margin-bottom: 20px;
}
.date {
position: relative;
bottom: 0;
margin-top: 30px;
}
}
</style>
</head>
<body>

<div class="container">

<h2>Assignment / Lab Copy Cover Page Generator</h2>

<input type="text" id="college" placeholder="College Name">
<input type="text" id="course" placeholder="Course Title">
<input type="text" id="courseCode" placeholder="Course Code">

<select id="submissionType">
<option value="Assignment">Assignment</option>
<option value="Lab Copy">Lab Copy</option>
</select>

<input type="text" id="teacher" placeholder="Faculty Name">
<input type="text" id="designation" placeholder="Designation">
<input type="text" id="department" placeholder="Department">

<input type="text" id="student" placeholder="Student Name">
<input type="text" id="studentId" placeholder="Student ID">
<input type="text" id="roll" placeholder="Roll Number">
<input type="text" id="reg" placeholder="Registration Number">
<input type="text" id="semester" placeholder="Semester">
<input type="text" id="session" placeholder="Session">
<input type="date" id="date">

<label><b>Upload College Logo</b></label>
<input type="file" id="logo" accept="image/*">

<button class="generate" onclick="generateCover()">Generate Preview</button>
<button class="download" onclick="downloadPDF()">Download PDF</button>

<div id="preview"></div>

</div>

<script>
let logoImage="";

document.getElementById("logo").addEventListener("change",function(e){
const file=e.target.files[0];
if(file){
const reader=new FileReader();
reader.onload=function(event){
logoImage=event.target.result;
};
reader.readAsDataURL(file);
}
});

function generateCover(){
const college=document.getElementById("college").value;
const course=document.getElementById("course").value;
const courseCode=document.getElementById("courseCode").value;
const submissionType=document.getElementById("submissionType").value;

const teacher=document.getElementById("teacher").value;
const designation=document.getElementById("designation").value;
const department=document.getElementById("department").value;

const student=document.getElementById("student").value;
const studentId=document.getElementById("studentId").value;
const roll=document.getElementById("roll").value;
const reg=document.getElementById("reg").value;

const semester=document.getElementById("semester").value;
const session=document.getElementById("session").value;
const inputDate = document.getElementById("date").value;

let date = "";
if (inputDate) {
    const parts = inputDate.split("-"); 
    date = `${parts[2]}-${parts[1]}-${parts[0]}`; 
}

document.getElementById("preview").style.display="block";

document.getElementById("preview").innerHTML=`
<div class="cover-page">
    <div class="type">${submissionType}</div>
    <div class="college">${college}</div>

    <div class="course-info">
        <div class="course"><b>Course Title:</b> ${course}</div>
        <div class="course"><b>Course Code:</b> ${courseCode}</div>
    </div>

    <div class="logo-container">
        ${logoImage ? `<img src="${logoImage}" class="logo">` : ""}
    </div>

    <table class="submission-table">
        <tr>
            <td>
                <div class="section">
                    <h3>Submitted To</h3>
                    <div class="name">${teacher}</div>
                    <p>${designation}</p>
                    <p>Department of ${department}</p>
                    <p>${college}</p>
                </div>
            </td>
            <td>
                <div class="section">
                    <h3>Submitted By</h3>
                    <div class="name">${student}</div>
                    <p><b>Student ID:</b> ${studentId}</p>
                    <p><b>Roll No:</b> ${roll}</p>
                    <p><b>Reg No:</b> ${reg}</p>
                    <p><b>Department:</b> ${department}</p>
                    <p><b>Semester:</b> ${semester}</p>
                    <p><b>Session:</b> ${session}</p>
                </div>
            </td>
        </tr>
    </table>

    <div class="date">
        <p>Date of Submission: ${date}</p>
    </div>
</div>
`;
}

function downloadPDF(){
const element=document.querySelector(".cover-page");

if(!element){
alert("Generate Preview First");
return;
}

// html2pdf-এর নিখুঁত সেটিংস যাতে ১ পাতায় ফুল-স্ক্রিন জেনারেট হয়
html2pdf().set({
margin: 0,
filename: "Cover_Page.pdf",
image: { type: "jpeg", quality: 1 },
html2canvas: { 
    scale: 2, 
    useCORS: true,
    letterRendering: true
},
jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
}).from(element).save();
}
</script>

</body>
</html>
