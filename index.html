<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assignment / Lab Copy Cover Page Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f2f2f2;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input,
select{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:12px 20px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
margin-right:10px;
}

.generate{
background:#1976d2;
color:#fff;
}

.download{
background:#2e7d32;
color:#fff;
}

#preview{
margin-top:30px;
display:none;
/* প্রিভিউ স্ক্রিনে দেখার জন্য ব্যাকগ্রাউন্ড ও বর্ডার */
background: #e0e0e0;
padding: 20px;
border-radius: 8px;
}

/* PDF COVER - 1 PAGE FIX */
.cover-page{
width:210mm;
height:297mm; /* min-height বদলে নির্দিষ্ট height দেওয়া হলো */
background:#fff;
margin:auto;
padding:20mm; /* পারফেক্ট মার্জিন */
font-family:"Times New Roman",serif;
text-align:center;
box-sizing: border-box;
display: flex;
flex-direction: column;
justify-content: space-between; /* সব এলিমেন্ট ১ পাতায় সমানভাবে সাজানোর জন্য */
}

.type{
font-size:32px;
font-weight:bold;
text-transform: uppercase;
margin-top: 10px;
}
  
.college{
font-size:34px;
line-height:1.2;
font-weight:bold;
margin-top: 15px;
}

.course-info {
margin-top: 15px;
}

.course{
font-size:22px;
margin:5px 0;
}

.logo-container {
height: 160px;
display: flex;
align-items: center;
justify-content: center;
margin: 15px 0;
}

.logo{
max-width:160px;
max-height:160px;
object-fit:contain;
}

/* সাবমিট সেকশনগুলোকে পাশাপাশি বা সুন্দর দূরত্বে রাখার জন্য */
.submission-details {
display: flex;
justify-content: space-between;
text-align: left;
margin-top: 20px;
padding: 0 10px;
}

.section{
width: 48%;
}

.section h3{
font-size:22px;
font-weight:bold;
border-bottom: 2px solid #000;
padding-bottom: 5px;
margin-bottom: 12px;
}

.name{
font-size:20px;
font-weight:bold;
margin-bottom:6px;
}

.section p{
font-size:16px;
line-height:1.4;
margin:4px 0;
}
  
.date{
margin-bottom: 15px;
font-size:18px;
font-weight:bold;
}

@media(max-width:850px){
/* শুধু ব্রাউজারে দেখার সুবিধার জন্য রেসপন্সিভ করা হলো, পিডিএফে এটার প্রভাব পড়বে না */
.cover-page{
width:100%;
height:auto;
padding:20px;
}
.submission-details {
flex-direction: column;
}
.section {
width: 100%;
margin-bottom: 20px;
}
}
</style>
</head>
<body>

<div class="container">

<h2>Assignment / Lab Copy Cover Page Generator</h2>

<input type="text" id="college" placeholder="College Name">
<input type="text" id="course" placeholder="Course Title">
<input type="text" id="courseCode" placeholder="Course Code">

<select id="submissionType">
<option value="Assignment">Assignment</option>
<option value="Lab Copy">Lab Copy</option>
</select>

<input type="text" id="teacher" placeholder="Faculty Name">
<input type="text" id="designation" placeholder="Designation">
<input type="text" id="department" placeholder="Department">

<input type="text" id="student" placeholder="Student Name">
<input type="text" id="studentId" placeholder="Student ID">
<input type="text" id="roll" placeholder="Roll Number">
<input type="text" id="reg" placeholder="Registration Number">
<input type="text" id="semester" placeholder="Semester">
<input type="text" id="session" placeholder="Session">
<input type="date" id="date">

<label><b>Upload College Logo</b></label>
<input type="file" id="logo" accept="image/*">

<button class="generate" onclick="generateCover()">Generate Preview</button>
<button class="download" onclick="downloadPDF()">Download PDF</button>

<div id="preview"></div>

</div>

<script>
let logoImage="";

document.getElementById("logo").addEventListener("change",function(e){
const file=e.target.files[0];
if(file){
const reader=new FileReader();
reader.onload=function(event){
logoImage=event.target.result;
};
reader.readAsDataURL(file);
}
});

function generateCover(){
const college=document.getElementById("college").value;
const course=document.getElementById("course").value;
const courseCode=document.getElementById("courseCode").value;
const submissionType=document.getElementById("submissionType").value;

const teacher=document.getElementById("teacher").value;
const designation=document.getElementById("designation").value;
const department=document.getElementById("department").value;

const student=document.getElementById("student").value;
const studentId=document.getElementById("studentId").value;
const roll=document.getElementById("roll").value;
const reg=document.getElementById("reg").value;

const semester=document.getElementById("semester").value;
const session=document.getElementById("session").value;
const inputDate = document.getElementById("date").value;

let date = "";
if (inputDate) {
    const parts = inputDate.split("-"); 
    date = `${parts[2]}-${parts[1]}-${parts[0]}`; 
}

document.getElementById("preview").style.display="block";

document.getElementById("preview").innerHTML=`
<div class="cover-page">
    <div>
        <div class="type">${submissionType}</div>
        <div class="college">${college}</div>
    </div>

    <div class="course-info">
        <div class="course"><b>Course Title:</b> ${course}</div>
        <div class="course"><b>Course Code:</b> ${courseCode}</div>
    </div>

    <div class="logo-container">
        ${logoImage ? `<img src="${logoImage}" class="logo">` : ""}
    </div>

    <div class="submission-details">
        <div class="section">
            <h3>Submitted To</h3>
            <div class="name">${teacher}</div>
            <p>${designation}</p>
            <p>${department}</p>
            <p>${college}</p>
        </div>

        <div class="section">
            <h3>Submitted By</h3>
            <div class="name">${student}</div>
            <p><b>Student ID:</b> ${studentId}</p>
            <p><b>Roll No:</b> ${roll}</p>
            <p><b>Reg No:</b> ${reg}</p>
            <p><b>Department:</b> ${department}</p>
            <p><b>Semester:</b> ${semester}</p>
            <p><b>Session:</b> ${session}</p>
        </div>
    </div>

    <div class="date">
        <p>Date of Submission: ${date}</p>
    </div>
</div>
`;
}

function downloadPDF(){
const element=document.querySelector(".cover-page");

if(!element){
alert("Generate Preview First");
return;
}

// PDF ডাউনলোড করার সময় একদম নিখুঁত ১ পেজ সাইজ বজায় রাখার অপশন
html2pdf().set({
margin: 0,
filename: "Cover_Page.pdf",
image: { type: "jpeg", quality: 1 },
html2canvas: { 
    scale: 2, 
    useCORS: true,
    logging: false
},
jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
}).from(element).save();
}
</script>

</body>
</html>
